<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown Preview</title>
    <link rel="stylesheet" href="vendor/github-markdown.css">
    <link rel="stylesheet" href="vendor/highlight-github.min.css" id="hljs-light">
    <link rel="stylesheet" href="vendor/highlight-github-dark.min.css" id="hljs-dark" disabled>
    <link rel="stylesheet" href="vendor/katex.min.css">
    <style>
        :root { color-scheme: light dark; }
        /* Solid (opaque) backgrounds so the native WKWebView layer can be drawn
           opaque — avoids the per-frame alpha-blended GPU blit during scroll that
           triggered a CoreAnimation/Metal shader crash on some machines. */
        html, body {
            margin: 0;
            padding: 0;
            background: #ffffff;
        }
        html[data-theme="dark"], body[data-theme="dark"] {
            background: #0d1117;
        }
        body {
            padding: 32px clamp(20px, 6vw, 64px);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        }
        .markdown-body {
            max-width: 880px;
            margin: 0 auto;
            background: transparent;
            box-sizing: border-box;
        }
        body[data-theme="dark"] .markdown-body {
            color-scheme: dark;
        }
        .mermaid {
            text-align: center;
            margin: 1em 0;
        }
        /* YAML frontmatter (Obsidian / Tolaria / Jekyll) */
        .frontmatter {
            margin: 0 0 24px;
            padding: 10px 16px;
            border-left: 3px solid #8b8b8b;
            background: rgba(0, 0, 0, 0.035);
            border-radius: 4px;
            font-size: 0.88em;
            color: #555;
        }
        body[data-theme="dark"] .frontmatter {
            border-left-color: #555;
            background: rgba(255, 255, 255, 0.04);
            color: #aaa;
        }
        .frontmatter pre {
            margin: 0;
            background: transparent;
            padding: 0;
        }
        .frontmatter code {
            background: transparent;
            padding: 0;
            font-size: inherit;
        }
        body.hide-frontmatter .frontmatter { display: none; }
    </style>
</head>
<body data-theme="light">
    <article id="content" class="markdown-body"></article>
    <script src="vendor/dompurify.min.js"></script>
    <script src="vendor/markdown-it.min.js"></script>
    <script src="vendor/markdown-it-task-lists.min.js"></script>
    <script src="vendor/highlight.min.js"></script>
    <script src="vendor/katex.min.js"></script>
    <script src="vendor/katex-auto-render.min.js"></script>
    <script src="vendor/mermaid.min.js"></script>
    <script src="render.js"></script>
</body>
</html>
