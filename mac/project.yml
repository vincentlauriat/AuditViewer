name: AuditViewer
options:
  bundleIdPrefix: com.vincent
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "16.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "KFLACS69T9"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ENABLE_APP_SANDBOX: NO
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  AuditViewer:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/web
        type: folder
        buildPhase: resources
      - path: Resources/webgraph
        type: folder
        buildPhase: resources
      - path: AppIcon.icns
        buildPhase: resources
    dependencies:
      - package: Sparkle
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Audit Viewer
        CFBundleName: AuditViewer
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "15.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticGraphicsSwitching: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Sparkle — flux de mise à jour automatique (clé EdDSA partagée avec les autres apps)
        SUFeedURL: "https://raw.githubusercontent.com/vincentlauriat/AuditViewer/main/mac/appcast.xml"
        SUPublicEDKey: "9PD2SBwLL4XoycyAGzaE+gO7ctuxSfuFMMajiZdXhXQ="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUAutomaticallyUpdate: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincent.AuditViewer
        PRODUCT_NAME: AuditViewer
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual

  AuditViewerIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ios/Sources
    info:
      path: ios/Info.plist
      properties:
        CFBundleDisplayName: Audit Viewer
        CFBundleName: AuditViewerIOS
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Expose le dossier de l'app dans Fichiers (« Sur mon iPhone › AuditViewer » + iCloud Drive)
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSUbiquitousContainers:
          iCloud.com.vincent.AuditViewerIOS:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: AuditViewer
            NSUbiquitousContainerSupportedFolderLevels: Any
    # Entitlements générés par XcodeGen (iCloud Documents) — fixe aussi CODE_SIGN_ENTITLEMENTS
    entitlements:
      path: ios/AuditViewerIOS.entitlements
      properties:
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.vincent.AuditViewerIOS
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.vincent.AuditViewerIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincent.AuditViewerIOS
        PRODUCT_NAME: AuditViewerIOS
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        DEVELOPMENT_TEAM: "KFLACS69T9"
        CODE_SIGN_STYLE: Automatic

  # Viewer Apple TV (lecture seule) — lit les audits via Bonjour + HTTP LAN
  # (le Mac partage le dossier Research, cf. LANServer). Pas d'iCloud, pas de Sparkle.
  AuditViewerTVOS:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: tvos/Sources
      # Modèles partagés (Foundation only) — référencés, pas dupliqués.
      - path: Sources/AuditManifest.swift
    info:
      path: tvos/Info.plist
      properties:
        CFBundleDisplayName: Audit Viewer
        CFBundleName: AuditViewerTVOS
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Réseau local : découverte Bonjour + autorisation requise (tvOS 14+).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSBonjourServices:
          - _auditviewer._tcp
        NSLocalNetworkUsageDescription: "Découvre le Mac qui partage vos dossiers d'audit sur le réseau local."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincent.AuditViewerTVOS
        PRODUCT_NAME: AuditViewerTVOS
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TVOS_DEPLOYMENT_TARGET: "17.0"
        DEVELOPMENT_TEAM: "KFLACS69T9"
        CODE_SIGN_STYLE: Automatic
